research:
- title: Inferring low-dimensional network dynamics with variational latent Gaussian process
  pi: Park, Il Memming
  fund: SUNY
  goal: This research is to understand the neural computations implemented in populations of neurons by deducing the latent dynamics from neural time series. 
  responsibility: Y. Zhao proposed a probabilistic generative model and developed a practical and efficient inference method, variational latent Gaussian process (vLGP), for recovering the low-dimensional hidden trajectories from neural recordings of primary visual cortex (V1) while the monkeys watch motion stimuli. This method can predict omitted spike trains, and capture both the toroidal topology of visual stimuli space, and the noise-correlation.
- title: Interpretable nonlinear dynamical model of neural trajectories
  pi: Park, Il Memming
  fund: SUNY
  goal: The goal is to interpret and visualize dynamics of neural trajectories by assuming low-dimensional continuous dynamics in a finite volume, and help understanding how neural system implements computation through its dynamics. 
  responsibility: Y. Zhao developed a nonlinear time series model of neural trajectories to recover qualitative features of the phase portrait such as attractors, slow points, and bifurcation, while also producing reliable long-term future predictions in a variety of dynamical models and in real neural data.
- title: Traumatic brain injury and bipolar psychosis in the Genomic Psychiatry Cohort
  pi: Malaspina, Dolores 
  fund: NIH
  goal: This research is to assess the potential role of TBI in predicting illness features within a population with established psychiatric diagnoses, with the possibility that a shared genetic vulnerability and a propensity for TBI may represent a gene-environment interaction, including increased propensity for posttraumatic symptoms, and, through genetic studies, reveal patterns with important implications for prevention, diagnosis, and prognosis of mental illness. 
  responsibility: Y. Zhao conducted clustering algorithm to probe differences between schizophrenia and bipolar disorder associated with variables of interest, and developed a method of choosing optimal number of clusters through contingency table of labeled clusters.
- title: Uncovering an image-based biomarker of depression
  pi: DeLorenzo, Christine 
  fund: SUNY
  goal: This research is to understand the underlying pattern of biology for diseases such as depression will allow us to effectively diagnose patients as well as provide targeted treatments. This is referred to as “precision medicine” and it revolutionized fields such as cancer therapy. The goal is to fundamentally change our understanding of major depression disorder (MDD), by uncovering a pattern of the disease from multimodal brain imaging, and bring precision medicine to MDD, through the discovery of a novel biomarker. 
  responsibility: Y. Zhao conducted statistical analysis using neuroimaging at baseline and one week into antidepressant use to determine if baseline and one-week imaging measures can be combined to track antidepressant response, and reducing high dimensional brain imaging data to its most meaningful components.

